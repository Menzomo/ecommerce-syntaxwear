<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sintaxwear - Tênis e Sneakers online</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components/header.css">
  <link rel="stylesheet" href="./css/components/hero.css">
  <link rel="stylesheet" href="./css/components/destaque.css">
  <link rel="stylesheet" href="./css/components/product-grid.css">
  <link rel="stylesheet" href="./css/components/product-card.css">
  <link rel="stylesheet" href="./css/components/footer.css">
</head>

<body>
  <!-- cabeçalho com logo e navegação -->
  <header>
    <div class="site-header">

      <h1 class="logo">
        <a href="/" title="Sintaxwear - Tênis e Sneakers online">
          <img src="./images/logo/logo.png" alt="Sintaxwear - Tênis e Sneakers online">
        </a>
      </h1>
      <nav class="nav-center" aria-label="Categorias Principais">
        <ul>
          <li><a href="#">Masculino</a></li>
          <li><a href="#">Feminino</a></li>
          <li><a href="#">Outlet</a></li>
        </ul>
      </nav>

      <nav class="quick-nav" aria-label="Menu rápido">
        <ul>
          <li><a href="#">Nossas lojas</a></li>
          <li><a href="#">Sobre</a></li>
          <li><a href="#" aria-label="Perfil"></a><img src="./images/icons/user.svg.svg" alt="Ícone de perfil"></li>
          <li><a href="#" aria-label="Ajuda"></a><img src="./images/icons/help.svg" alt="Ícone de ajuda"></li>
          <li><a href="#" aria-label="Carrinho"></a><img src="./images/icons/cart.svg" alt="Ícone de carrinho">
          </li>
        </ul>
      </nav>



    </div>
    <nav class="main-nav">
      <!-- links de navegação -->
    </nav>
    </div>
  </header>

  <main>
    <!-- seção hero -->
    <section class="hero">
      <h2>Bem-vindo</h2>
    </section>

    <!-- seção categorias de tênis -->
    <section class="categoris">
      <h2>Categorias</h2>
      <!-- lista de categorias -->
    </section>

    <!-- grid de produtos em destaque -->
    <section class="featured-products">
      <h2>Produtos em Destaque</h2>
    </section>
  </main>

  <!-- rodapé com contatos e links úteis -->
  <footer>
    <div class="footer-info">
      <div class="contatos">
        <!-- informações de contato -->
      </div>
      <div class="links-uteis">
        <!-- links úteis -->
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>

</html>
