<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ecommerce</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components/header.css">
  <link rel="stylesheet" href="./css/components/hero.css">
  <link rel="stylesheet" href="./css/components/destaque.css">
  <link rel="stylesheet" href="./css/components/product-grid.css">
  <link rel="stylesheet" href="./css/components/product-card.css">
  <link rel="stylesheet" href="./css/components/footer.css">
</head>

<body>
  <!-- cabeçalho com logo e navegação -->
  <header>
    <div class="container header-content">
      <div class="logo">
        <h1>Loja</h1>
        <!-- logo aqui -->
      </div>
      <nav class="main-nav">
        <!-- links de navegação -->
      </nav>
    </div>
  </header>

  <main>
    <!-- seção hero -->
    <section class="hero">
      <h2>Bem-vindo</h2>
    </section>

    <!-- seção categorias de tênis -->
    <section class="categoris">
      <h2>Categorias</h2>
      <!-- lista de categorias -->
    </section>

    <!-- grid de produtos em destaque -->
    <section class="featured-products">
      <h2>Produtos em Destaque</h2>
    </section>
  </main>

  <!-- rodapé com contatos e links úteis -->
  <footer>
    <div class="footer-info">
      <div class="contatos">
        <!-- informações de contato -->
      </div>
      <div class="links-uteis">
        <!-- links úteis -->
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>

</html>
